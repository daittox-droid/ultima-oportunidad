<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Para Ti ❤️</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff758c,#ff7eb3,#fad0c4);display:flex;justify-content:center;align-items:center;height:100vh}
.box{max-width:760px;background:rgba(255,255,255,.18);padding:30px;border-radius:20px;text-align:center;color:white;backdrop-filter:blur(10px)}
img{width:320px;max-width:100%;border-radius:16px;margin:20px 0}
button{padding:12px 28px;margin:8px;border:none;border-radius:10px;cursor:pointer;font-size:18px}
</style></head>
<body><div class="box">
<h1>❤️ Para Ti ❤️</h1>
<p>Sé que cometí demasiados errores y sé que dudo que puedas perdonarme, pero de verdad te amo demasiado. Suena muy estúpido, pero... ¿me darías una última oportunidad para demostrarte lo mejor de mí? Aunque sé que dudo que aceptes, quería decirte lo que siento de corazón.</p>
<img id="foto" src="inicio.jpg">
<div>
<button onclick="si()">Sí ❤️</button>
<button onclick="noo()">No 💔</button>
</div>
<p id="msg"></p>
</div>
<script>
function si(){
foto.src="nosotros.jpg";
msg.innerHTML="❤️ Gracias. Ahora cambia tu foto de WhatsApp por una foto de nosotros. ❤️";
}
function noo(){
foto.src="ella.jpg";
msg.innerHTML="💔 Entonces cambia tu foto de WhatsApp por otra foto tuya. 💔";
}
</script></body></html>
