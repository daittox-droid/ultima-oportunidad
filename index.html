<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Para Ti ❤️</title>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff758c,#ff7eb3,#fad0c4);display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.c{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);padding:30px;border-radius:20px;text-align:center;color:#fff;max-width:700px}
img{width:320px;max-width:100%;border-radius:16px}button{padding:12px 25px;margin:10px;border:none;border-radius:10px;cursor:pointer}
</style></head><body><div class="c">
<h1>❤️ Para Ti ❤️</h1>
<p>Sé que cometí demasiados errores y sé que dudo que puedas perdonarme, pero de verdad te amo demasiado. Suena muy estúpido, pero... ¿me darías una última oportunidad para demostrarte lo mejor de mí? Aunque sé que dudo que aceptes, quería decirte lo que siento de corazón.</p>
<img id="foto" src="nosotros.jpg">
<div><button onclick="si()">Sí ❤️</button><button onclick="no()">No 💔</button></div>
<p id="m"></p></div>
<script>
function si(){foto.src='nosotros2.jpg';m.innerHTML='❤️ Gracias por darme otra oportunidad. Prometo demostrarte con hechos todo lo que siento por ti.';}
function no(){foto.src='ella.jpg';m.innerHTML='Entiendo tu decisión. Gracias por escucharme. Siempre desearé que seas muy feliz. ❤️';}
</script></body></html>
